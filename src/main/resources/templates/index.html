<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>News Focus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <header class="mb-4 text-center">
        <h1 class="fw-bold">News Focus</h1>
        <p class="text-secondary mb-0">AI・半導体・米国テック企業ニュースを見やすくチェックできるニュースアプリ</p>
    </header>

    <section class="card shadow-sm mb-4">
        <div class="card-body">
            <form method="get" action="/" class="row g-2">
                <div class="col-12 col-md-10">
                    <input
                            type="text"
                            name="keyword"
                            th:value="${keyword}"
                            class="form-control"
                            placeholder="キーワードを入力 例: AI, NVIDIA, TSMC">
                </div>
                <div class="col-12 col-md-2 d-grid">
                    <button type="submit" class="btn btn-primary">検索</button>
                </div>
            </form>
        </div>
    </section>

    <section class="card shadow-sm mb-4">
        <div class="card-body">
            <h2 class="h5 mb-3">AI・半導体・米国テック</h2>
            <div class="d-flex flex-wrap gap-2">
                <a href="/?theme=ai" class="btn btn-outline-primary">AI</a>
                <a href="/?theme=generative-ai" class="btn btn-outline-primary">生成AI</a>
                <a href="/?theme=nvidia" class="btn btn-outline-primary">NVIDIA</a>
                <a href="/?theme=tsmc" class="btn btn-outline-primary">TSMC</a>
            </div>
        </div>
    </section>

    <section>
        <h2 class="h4 mb-3" th:text="${displayTitle}">AI の最新ニュース</h2>
        <div class="row g-3">
            <div class="col-12 col-lg-4" th:each="article : ${articles}">
                <article class="card h-100 shadow-sm">
                    <div class="card-body d-flex flex-column">
                        <span class="badge text-bg-primary mb-2 align-self-start" th:text="${article.theme}">テーマ</span>
                        <h3 class="h6" th:text="${article.title}">ニュースタイトル</h3>
                        <p class="text-secondary small" th:text="${article.description}">ニュース概要</p>
                        <ul class="list-unstyled small text-muted mt-auto mb-3">
                            <li>媒体名: <span th:text="${article.sourceName}">ニュース提供元</span></li>
                            <li>公開日: <span th:text="${article.publishedAt}">2026-05-11</span></li>
                        </ul>
                        <div class="d-flex gap-2">
                            <a th:if="${article.url != null and !#strings.isEmpty(article.url)}"
                               th:href="${article.url}"
                               class="btn btn-sm btn-primary"
                               target="_blank"
                               rel="noopener noreferrer">続きを読む</a>
                            <button th:unless="${article.url != null and !#strings.isEmpty(article.url)}"
                                    type="button"
                                    class="btn btn-sm btn-secondary"
                                    disabled>URLなし</button>
                            <button type="button" class="btn btn-sm btn-outline-secondary" disabled>保存（準備中）</button>
                        </div>
                    </div>
                </article>
            </div>
        </div>
    </section>
</div>
</body>
</html>

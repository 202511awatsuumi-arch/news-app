<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>保存記事一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <header class="mb-4">
        <h1 class="fw-bold mb-2">保存記事一覧</h1>
        <a href="/">トップへ戻る</a>
    </header>

    <p class="text-secondary" th:if="${#lists.isEmpty(savedArticles)}">保存した記事はまだありません。</p>

    <div class="row g-3" th:unless="${#lists.isEmpty(savedArticles)}">
        <div class="col-12 col-lg-6" th:each="article : ${savedArticles}">
            <article class="card h-100 shadow-sm">
                <div class="card-body d-flex flex-column">
                    <span class="badge text-bg-primary mb-2 align-self-start" th:text="${article.theme}">テーマ</span>
                    <h2 class="h5" th:text="${article.title}">タイトル</h2>
                    <p class="text-secondary small" th:text="${article.description}">概要</p>
                    <ul class="list-unstyled small text-muted mt-auto mb-3">
                        <li>媒体名: <span th:text="${article.sourceName}">ニュース提供元</span></li>
                        <li>公開日: <span th:text="${article.publishedAt}">2026-05-11</span></li>
                        <li>保存日時: <span th:text="${article.savedAt}">2026-05-11T10:00:00</span></li>
                    </ul>
                    <div class="d-flex gap-2">
                        <a th:if="${article.url != null and !#strings.isEmpty(article.url)}"
                           th:href="${article.url}"
                           class="btn btn-sm btn-primary"
                           target="_blank"
                           rel="noopener noreferrer">元記事を開く</a>
                        <button th:unless="${article.url != null and !#strings.isEmpty(article.url)}"
                                type="button"
                                class="btn btn-sm btn-secondary"
                                disabled>URLなし</button>
                        <form method="post" th:action="@{/saved/{id}/delete(id=${article.id})}" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-danger">削除</button>
                        </form>
                    </div>
                </div>
            </article>
        </div>
    </div>
</div>
</body>
</html>
